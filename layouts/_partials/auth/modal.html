<div id="auth-modal-backdrop" class="auth-modal-backdrop auth-hidden" aria-hidden="true">
    <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
        <button type="button" id="auth-modal-close" class="auth-modal__close" aria-label="Close login form">
            ×
        </button>

        <header class="auth-modal__header">
            <h2 id="auth-modal-title" class="auth-modal__title">
                {{ T "login" | default "Log in" }}
            </h2>
            <p class="auth-modal__subtitle">
                {{ T "login.subtitle" | default "Sign in to personalize your reading experience on this blog." }}
            </p>
        </header>

        <form id="auth-form" class="auth-form" novalidate>
            <div class="auth-form__field">
                <label for="auth-name" class="auth-form__label">
                    {{ T "name" | default "Name" }}
                </label>
                <input
                    id="auth-name"
                    name="name"
                    type="text"
                    class="auth-form__input"
                    autocomplete="name"
                    required
                    placeholder="{{ T `login.namePlaceholder` | default `Your name` }}"
                >
            </div>

            <div class="auth-form__field">
                <label for="auth-email" class="auth-form__label">
                    {{ T "email" | default "Email" }}
                </label>
                <input
                    id="auth-email"
                    name="email"
                    type="email"
                    class="auth-form__input"
                    autocomplete="email"
                    required
                    placeholder="{{ T `login.emailPlaceholder` | default `you@example.com` }}"
                >
            </div>

            <p class="auth-form__hint">
                {{ T "login.notice" | default "This demo login only lives in your browser and does not create a real account." }}
            </p>

            <div class="auth-form__actions">
                <button type="submit" class="auth-button auth-button--primary auth-button--full">
                    {{ T "continue" | default "Continue" }}
                </button>
            </div>
        </form>
    </div>
</div>
